name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:pages
        env:
          GITHUB_PAGES: 'true'
      # 이 미러(GitHub Pages)는 정식 오픈 전 테스트용이므로 검색엔진 색인을 차단한다.
      # 정식 도메인 배포에는 영향이 없도록 소스(public/)가 아닌 이 워크플로에서만 주입한다.
      - name: Block search indexing (test mirror only)
        run: |
          printf 'User-agent: *\nDisallow: /\n' > client-build/robots.txt
          sed -i 's|<head>|<head><meta name="robots" content="noindex,nofollow" />|' client-build/index.html
      - run: cp client-build/index.html client-build/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client-build
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

